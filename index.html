<!DOCTYPE html>
<html lang="cs">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Samet na Hejčině</title>
		<meta name="description" content="Samet na Hejčíně je vzdělávací iniciativa, která seznamuje studenty s nezávislostí a svobodou v České republice">
		<meta name="keywords" content="samet, hejčín, škola, vzdělávání, gymnázium, nezávislost, svoboda, Česko, trikolorap, program, studenti, historie, svoboda">
		<meta name="author" content="Albert Petrovskyi">
		<meta name="copyright" content="Copyright © 2025 Albert Petrovskyi. All rights reserved.">
		<meta name="address" content="Gymnázium, Olomouc - Hejčín, Czech Republic">
		<meta name="robots" content="index, follow">
		<link rel="icon" href="./img/favicon.ico" type="image/x-icon">
		<link rel="stylesheet" href="index.css">
	</head>
	<body>
		<div class="wrapper">
			<section class="header">
				<svg class="header__flag flag-left" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 68 67" fill="none">
					<path d="M26 0L0 26V47.5L47 0H26Z" fill="#D7141A"/>
					<path d="M47 0L0 47.5V67L67.2698 0H47Z" fill="#1A3FB2"/>
				</svg>
				<span class="header__reg">Přihlášení začne za 02:04:59</span>
				<svg class="header__flag flag-right" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 67 67" fill="none">
					<path d="M41.2698 0L67.2698 26V47.5L20.2698 0H41.2698Z" fill="#D7141A"/>
					<path d="M20.2698 0L67.2698 47.5V67L0 0H20.2698Z" fill="#1A3FB2"/>
				</svg>
			</section>
			<section class="hero">
				<span class="hero__quote">
					<span class="quote-blue">Pravda a láska</span>
					musí zvítězit nad
					<span class="quote-red">lží a nenávistí</span>
				</span>
			</section>
			<section class="steps">
				<div class="steps__container">
					<span class="steps__container-title">1</span>
					<span class="steps__container-text">Přihlas se</span>
				</div>
				<div class="steps__container">
					<span class="steps__container-title">2</span>
					<span class="steps__container-text">Vyber 2 programy</span>
				</div>
				<div class="steps__container">
					<span class="steps__container-title">3</span>
					<span class="steps__container-text">Potvrď a hotovo!</span>
				</div>
			</section>
			<section class="schedule">
				<span class="schedule__title">Rozvrh</span>
				<div class="schedule__plan">
					<div class="plan__block">
						<span>Den</span>
						<span>21. listopadu</span>
					</div>
					<div class="plan__block">
						<span>První program</span>
						<span>8:00 &#8211; 8:45</span>
					</div>
					<div class="plan__block">
						<span>Druhý program</span>
						<span>8:55 &#8211; 9:40</span>
					</div>
				</div>
			</section>
			<section class="programs">
				
			</section>
			<section class="action">
				
			</section>
			<section class="footer">
				
			</section>
		</div>
	</body>
	<script src="index.js"></script>
</html>
